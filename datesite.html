<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rendezvous | Meeting Arranger</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: #1f2833;
            --surface-light: #2c3947;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --gold-hover: #f3e5ab;
            --text-main: #c5c6c7;
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header { text-align: center; margin-bottom: 2.5rem; }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .container {
            background-color: var(--surface-color);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--gold-dim);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--surface-light);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Calendar UI */
        .calendar-icon {
            width: 140px;
            height: 160px;
            background: #fdfdfd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }

        .cal-header {
            background-color: #8b0000;
            color: white;
            padding: 0.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cal-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #111;
        }

        .cal-day { font-size: 3rem; font-weight: bold; line-height: 1; }
        .cal-year { font-size: 1rem; color: #555; margin-top: 0.2rem; }

        /* Clock UI */
        .clock {
            width: 150px;
            height: 150px;
            border: 6px solid var(--gold);
            border-radius: 50%;
            position: relative;
            background-color: #111;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 15px rgba(212,175,55,0.2);
            margin-bottom: 1.5rem;
        }

        .center-dot {
            position: absolute;
            width: 10px; height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: bottom;
            background-color: var(--gold);
            border-radius: 4px;
            transform: translateX(-50%) rotate(0deg);
            transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        .hour-hand { width: 4px; height: 35px; z-index: 5; }
        .minute-hand { width: 3px; height: 55px; z-index: 6; }

        .clock-marker {
            position: absolute;
            width: 2px; height: 8px;
            background-color: var(--text-main);
            top: 6px; left: 50%;
            transform-origin: 50% 69px;
        }

        /* Location UI */
        .location-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            fill: var(--gold);
        }

        .location-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-light);
            line-height: 1.3;
        }

        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        /* Controls & Answer */
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        button {
            background-color: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 0.8rem 2.5rem;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        button:hover {
            background-color: var(--gold);
            color: var(--bg-color);
        }

        button.solid {
            background-color: var(--gold);
            color: var(--bg-color);
        }

        button.solid:hover {
            background-color: var(--gold-hover);
            border-color: var(--gold-hover);
        }

        .answer-box {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--gold-dim);
            border-radius: 8px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            text-align: center;
        }

        .answer-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--text-light);
            line-height: 1.5;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .answer-text.visible { opacity: 1; }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>The Rendezvous</h1>
        <div class="subtitle">Meeting Arrangements & Time Telling</div>
    </header>

    <div class="container">
        
        <div class="dashboard">
            <!-- Date Card -->
            <div class="card">
                <div class="card-label">The Date</div>
                <div class="calendar-icon">
                    <div class="cal-header" id="cal-month">DEC</div>
                    <div class="cal-body">
                        <div class="cal-day" id="cal-day">25</div>
                        <div class="cal-year" id="cal-year">2026</div>
                    </div>
                </div>
            </div>

            <!-- Time Card -->
            <div class="card">
                <div class="card-label">The Time</div>
                <div class="clock" id="clock-face">
                    <div class="center-dot"></div>
                    <div class="hand hour-hand" id="hour-hand"></div>
                    <div class="hand minute-hand" id="minute-hand"></div>
                </div>
            </div>

            <!-- Location Card -->
            <div class="card">
                <div class="card-label">The Location</div>
                <svg class="location-icon" viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                <div class="location-text" id="loc-text">Ayutthaya Historical Park</div>
            </div>
        </div>

        <div class="controls">
            <button class="solid" onclick="generateMeeting()">Generate Scenario</button>
            <button onclick="revealAnswer()">Show Answer</button>
        </div>

        <div class="answer-box">
            <div class="answer-text" id="full-answer"></div>
        </div>

    </div>

    <script>
        // Setup Clock Markers
        const clockFace = document.getElementById('clock-face');
        for (let i = 0; i < 12; i++) {
            const marker = document.createElement('div');
            marker.className = 'clock-marker';
            marker.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
            clockFace.appendChild(marker);
        }

        // --- Data Dictionaries ---
        const numbers = ["", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve", "thirteen", "fourteen", "quarter", "sixteen", "seventeen", "eighteen", "nineteen", "twenty", "twenty-one", "twenty-two", "twenty-three", "twenty-four", "twenty-five", "twenty-six", "twenty-seven", "twenty-eight", "twenty-nine", "half"];
        const ordinals = ["", "first", "second", "third", "fourth", "fifth", "sixth", "seventh", "eighth", "ninth", "tenth", "eleventh", "twelfth", "thirteenth", "fourteenth", "fifteenth", "sixteenth", "seventeenth", "eighteenth", "nineteenth", "twentieth", "twenty-first", "twenty-second", "twenty-third", "twenty-fourth", "twenty-fifth", "twenty-sixth", "twenty-seventh", "twenty-eighth", "twenty-ninth", "thirtieth", "thirty-first"];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        // Vocab suited for general meetings and heritage tourism
        const locations = [
            "the vocational college",
            "the heritage museum",
            "Ayutthaya Historical Park",
            "the coffee shop",
            "the main library",
            "the central hotel lobby",
            "the train station",
            "Wat Mahathat",
            "the conference room",
            "the tourist information center"
        ];

        let currentTargetSentence = "";

        function getYearWords(year) {
            // Simplified for 2020s
            const lastTwo = year % 100;
            let lastTwoStr = "";
            if (lastTwo < 10) lastTwoStr = "oh " + numbers[lastTwo];
            else if (lastTwo < 20) lastTwoStr = numbers[lastTwo];
            else if (lastTwo === 26) lastTwoStr = "twenty-six";
            else if (lastTwo === 27) lastTwoStr = "twenty-seven";
            else if (lastTwo === 28) lastTwoStr = "twenty-eight";
            else if (lastTwo === 29) lastTwoStr = "twenty-nine";
            else if (lastTwo === 30) lastTwoStr = "thirty";
            
            return "twenty " + lastTwoStr;
        }

        function generateMeeting() {
            // Hide previous answer
            document.getElementById('full-answer').classList.remove('visible');

            // 1. GENERATE DATE
            const year = Math.floor(Math.random() * (2030 - 2024 + 1)) + 2024;
            const monthIdx = Math.floor(Math.random() * 12);
            const daysInMonth = [31, (year % 4 === 0 ? 29 : 28), 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            const day = Math.floor(Math.random() * daysInMonth[monthIdx]) + 1;

            document.getElementById('cal-month').innerText = months[monthIdx].substring(0, 3).toUpperCase();
            document.getElementById('cal-day').innerText = day;
            document.getElementById('cal-year').innerText = year;

            const dateString = `the ${ordinals[day]} of ${months[monthIdx]}, ${getYearWords(year)}`;

            // 2. GENERATE TIME
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute;
            const rand = Math.random();
            if (rand < 0.6) {
                // 60% chance for standard teaching intervals
                const commonMinutes = [0, 15, 30, 45, 10, 20];
                minute = commonMinutes[Math.floor(Math.random() * commonMinutes.length)];
            } else {
                minute = Math.floor(Math.random() * 12) * 5; 
            }

            const hourDeg = (hour * 30) + (minute * 0.5);
            const minDeg = minute * 6;
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minDeg}deg)`;

            let timeString = "";
            let nextHour = hour === 12 ? 1 : hour + 1;

            if (minute === 0) {
                timeString = `${numbers[hour]} o'clock`;
            } else if (minute <= 30) {
                let mWord = numbers[minute];
                let suffix = (minute % 15 !== 0 && minute !== 30) ? " minutes" : "";
                timeString = `${mWord}${suffix} past ${numbers[hour]}`;
            } else {
                let minLeft = 60 - minute;
                let mWord = numbers[minLeft];
                let suffix = (minLeft % 15 !== 0) ? " minutes" : "";
                timeString = `${mWord}${suffix} to ${numbers[nextHour]}`;
            }

            // 3. GENERATE LOCATION
            const loc = locations[Math.floor(Math.random() * locations.length)];
            document.getElementById('loc-text').innerText = loc.replace(/\b\w/g, l => l.toUpperCase()); // Title Case for UI

            // 4. CONSTRUCT SENTENCE
            currentTargetSentence = `Let's meet on ${dateString} at ${timeString} at ${loc}.`;
            document.getElementById('full-answer').innerText = currentTargetSentence;
        }

        function revealAnswer() {
            const answerEl = document.getElementById('full-answer');
            if(currentTargetSentence !== "") {
                answerEl.classList.add('visible');
            } else {
                alert("Please click 'Generate Scenario' first!");
            }
        }

        // Initialize on load
        window.onload = () => {
            generateMeeting();
            // Hide answer on initial load
            setTimeout(() => {
                document.getElementById('full-answer').classList.remove('visible');
            }, 50);
        };
    </script>
</body>
</html>
